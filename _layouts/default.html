---
layout: null
---

<!doctype html>
<html lang="en">
  {% include head.html %}
  <body>
    <div class="page-shell site-shell">
      <header class="site-header">
        <div class="site-brand">
          <a class="site-brand-name" href="{{ '/' | relative_url }}"
            >{{ site.title }}</a
          >
          <p class="site-brand-tag">{{ site.description }}</p>
        </div>
        <button
          class="nav-toggle"
          aria-expanded="false"
          aria-controls="site-navigation"
          aria-label="Toggle navigation"
        >
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
        </button>

        <nav id="site-navigation" class="site-nav" aria-label="Main navigation">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/archive.html' | relative_url }}">Archive</a>
          {% if site.github_username %}<a
            href="https://github.com/{{ site.github_username }}"
            target="_blank"
            rel="noopener"
            >GitHub</a
          >{% endif %}
          <button
            class="theme-toggle theme-toggle-mobile"
            type="button"
            aria-label="Toggle color theme"
            aria-pressed="false"
          >
            <span class="theme-toggle-icon" aria-hidden="true">🌙</span>
            <span class="theme-toggle-text">Dark</span>
          </button>
        </nav>

        <button
          class="theme-toggle"
          type="button"
          aria-label="Toggle color theme"
          aria-pressed="false"
        >
          <span class="theme-toggle-icon" aria-hidden="true">🌙</span>
          <span class="theme-toggle-text">Dark</span>
        </button>
      </header>

      <main class="site-main">{{ content }}</main>

      <footer class="site-footer">
        <p>Simple, fast, and readable — built for modern tech writing.</p>
        <p>
          Reach me at <a href="mailto:{{ site.email }}">{{ site.email }}</a>
        </p>
      </footer>

      <button class="back-to-top" type="button" aria-label="Back to top" hidden>
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
      </button>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var btn = document.querySelector(".nav-toggle");
        var nav = document.getElementById("site-navigation");
        if (btn && nav) {
          btn.addEventListener("click", function () {
            var isOpen = nav.classList.toggle("open");
            btn.setAttribute("aria-expanded", isOpen ? "true" : "false");
          });
        }

        var root = document.documentElement;
        var metaThemeColor = document.querySelector('meta[name="theme-color"]');

        function syncThemeBtns(theme) {
          document.querySelectorAll(".theme-toggle").forEach(function (btn) {
            var icon = btn.querySelector(".theme-toggle-icon");
            var txt = btn.querySelector(".theme-toggle-text");
            btn.setAttribute(
              "aria-pressed",
              theme === "dark" ? "true" : "false",
            );
            if (icon) icon.textContent = theme === "dark" ? "☀️" : "🌙";
            if (txt) txt.textContent = theme === "dark" ? "Light" : "Dark";
            btn.setAttribute(
              "aria-label",
              theme === "dark" ? "Switch to light mode" : "Switch to dark mode",
            );
          });
        }

        function applyTheme(theme) {
          root.setAttribute("data-theme", theme);
          syncThemeBtns(theme);
          if (metaThemeColor) {
            metaThemeColor.setAttribute(
              "content",
              theme === "dark" ? "#07101c" : "#f8fbff",
            );
          }
          localStorage.setItem("site-theme", theme);
        }

        var storedTheme = localStorage.getItem("site-theme");
        var prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        var theme = storedTheme || (prefersDark ? "dark" : "light");
        applyTheme(theme);

        document.querySelectorAll(".theme-toggle").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var nextTheme =
              root.getAttribute("data-theme") === "dark" ? "light" : "dark";
            applyTheme(nextTheme);
          });
        });

        /* Back to top */
        var backBtn = document.querySelector(".back-to-top");
        if (backBtn) {
          var scrollThreshold = 400;
          window.addEventListener("scroll", function () {
            if (window.scrollY > scrollThreshold) {
              backBtn.removeAttribute("hidden");
            } else {
              backBtn.setAttribute("hidden", "");
            }
          });
          backBtn.addEventListener("click", function () {
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        }

        /* Post carousel (homepage) */
        var carousel = document.querySelector(".post-carousel");
        if (carousel) {
          var items = carousel.querySelectorAll(".post-carousel-item");
          var prevBtn = carousel.querySelector(".post-carousel-prev");
          var nextBtn = carousel.querySelector(".post-carousel-next");
          var counterEl = carousel.querySelector(".post-carousel-current");
          var current = 0;
          var total = items.length;

          function showItem(index) {
            items.forEach(function (el) {
              el.removeAttribute("data-active");
            });
            items[index].setAttribute("data-active", "true");
            if (counterEl) counterEl.textContent = index + 1;
            current = index;
          }

          if (prevBtn) {
            prevBtn.addEventListener("click", function () {
              var prev = current - 1;
              if (prev < 0) prev = total - 1;
              showItem(prev);
            });
          }
          if (nextBtn) {
            nextBtn.addEventListener("click", function () {
              var next = current + 1;
              if (next >= total) next = 0;
              showItem(next);
            });
          }
        }
      });
    </script>
  </body>
</html>
