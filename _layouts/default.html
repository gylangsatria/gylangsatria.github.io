---
layout: null
---
<!DOCTYPE html>
<html lang="en">
{% include head.html %}
<body class="site-shell">
  <div class="page-shell">
    <header class="site-header">
      <div class="site-brand">
        <a class="site-brand-name" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <p class="site-brand-tag">{{ site.description }}</p>
      </div>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/archive.html' | relative_url }}">Archive</a>
        {% if site.github_username %}<a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>{% endif %}
      </nav>
    </header>

    <main class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>Simple, fast, and readable — built for modern tech writing.</p>
      <p>Reach me at <a href="mailto:{{ site.email }}">{{ site.email }}</a></p>
    </footer>
  </div>
</body>
</html>
